<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Bar — Git Gamification</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>


<body>
  <div class="xp-circle-wrapper">
    <!-- SVG Progress Ring -->
    <svg class="xp-ring-svg" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="xp-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00e5ff" />
          <stop offset="100%" stop-color="#76ff03" />
        </linearGradient>
      </defs>
      <!-- Background track -->
      <circle class="xp-ring-track" cx="40" cy="40" r="30" />
      <!-- Progress arc -->
      <circle id="xp-progress" class="xp-ring-progress" cx="40" cy="40" r="30" />
    </svg>

    <!-- Level badge in the center -->
    <div class="xp-center">
      <div id="xp-level" class="xp-level-badge">1</div>
      <div id="particles"></div>
    </div>
  </div>



  <script>
    const { ipcRenderer } = require('electron');

    // ── Constants ──
    const CIRCUMFERENCE = 2 * Math.PI * 30; // ≈ 188.5
    const BASE_XP = 100;
    const XP_PER_COMMIT = 25;
    const GROWTH_FACTOR = 1.5;

    // ── DOM Elements ──
    const progressEl = document.getElementById('xp-progress');
    const levelEl = document.getElementById('xp-level');
    const wrapper = document.querySelector('.xp-circle-wrapper');
    const particlesContainer = document.getElementById('particles');


    // ── State ──
    let level = 1;
    let currentXP = 0;
    let totalCommits = 0;
    let isInitialized = false;

    function getMaxXP(lvl) {
      return Math.floor(BASE_XP * Math.pow(GROWTH_FACTOR, lvl - 1));
    }

    function updateRing() {
      const maxXP = getMaxXP(level);
      const progress = Math.min(currentXP / maxXP, 1);
      const offset = CIRCUMFERENCE * (1 - progress);
      progressEl.style.strokeDashoffset = offset;
      levelEl.textContent = level;


      // Save to disk only if loaded
      if (isInitialized) {
        ipcRenderer.send('save-data', { level, currentXP, totalCommits });
      }
    }

    // ── Add XP with level-up logic ──
    function addXP(amount) {
      currentXP += amount;
      let maxXP = getMaxXP(level);
      let levelsGained = 0;

      while (currentXP >= maxXP) {
        currentXP -= maxXP;
        level++;
        levelsGained++;
        maxXP = getMaxXP(level);
      }

      if (levelsGained > 0) {
        triggerLevelUpEffects();
      } else {
        triggerGainXPEffects();
      }

      updateRing();
    }

    function triggerGainXPEffects() {
      progressEl.classList.remove('xp-gain-anim');
      void progressEl.offsetWidth; // Trigger reflow
      progressEl.classList.add('xp-gain-anim');
    }

    function triggerLevelUpEffects() {
      // Flash the whole ring
      wrapper.classList.remove('level-up-anim');
      void wrapper.offsetWidth;
      wrapper.classList.add('level-up-anim');

      // Pop the badge
      levelEl.classList.remove('badge-pop');
      void levelEl.offsetWidth;
      levelEl.classList.add('badge-pop');

      // Explode particles
      triggerParticles();
    }

    function triggerParticles() {
      for (let i = 0; i < 12; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 40;
        const size = 3 + Math.random() * 4;
        
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
        
        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }
    }

    // ── Git Commit Event ──
    ipcRenderer.on('git-commit', () => {
      totalCommits++;
      addXP(XP_PER_COMMIT);
    });

    // ── Load saved data ──
    ipcRenderer.on('init-data', (event, data) => {
      level = data.level || 1;
      currentXP = data.currentXP || 0;
      totalCommits = data.totalCommits || 0;
      isInitialized = true;
      updateRing();
    });



    // ── Hover state ──
    ipcRenderer.on('hover-state', (event, hovered) => {
      document.body.classList.toggle('is-hovered', hovered);
    });

    // ── Initialize with empty ring ──
    updateRing();
  </script>
</body>

</html>
