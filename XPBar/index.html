<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XP Bar — Git Gamification</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="mode-circular">
  <!-- 1. Circular Mode -->
  <div class="xp-circle-wrapper">
    <svg class="xp-ring-svg" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="xp-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#00e5ff" />
          <stop offset="100%" stop-color="#76ff03" />
        </linearGradient>
      </defs>
      <circle class="xp-ring-track" cx="40" cy="40" r="30" />
      <circle id="xp-progress" class="xp-ring-progress" cx="40" cy="40" r="30" />
    </svg>
    <div class="xp-center">
      <div id="xp-level" class="xp-level-badge">1</div>
    </div>
  </div>

  <!-- 2. Horizontal Mode -->
  <div class="xp-horizontal-wrapper">
    <div class="xp-bar-level" id="xp-bar-level">1</div>
    <div class="xp-bar-track">
      <div class="xp-bar-fill" id="xp-bar-fill"></div>
    </div>
  </div>

  <div id="particles"></div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── Constants ──
    const CIRCUMFERENCE = 2 * Math.PI * 30;
    const BASE_XP = 100;
    const XP_PER_COMMIT = 25;
    const GROWTH_FACTOR = 1.5;

    // ── DOM Elements ──
    const progressEl = document.getElementById('xp-progress');
    const levelEl = document.getElementById('xp-level');
    const barFillEl = document.getElementById('xp-bar-fill');
    const barLevelEl = document.getElementById('xp-bar-level');
    const circleWrapper = document.querySelector('.xp-circle-wrapper');
    const horizontalWrapper = document.querySelector('.xp-horizontal-wrapper');
    const particlesContainer = document.getElementById('particles');

    // ── State ──
    let level = 1;
    let currentXP = 0;
    let totalCommits = 0;
    let isInitialized = false;
    let currentShape = 'circular';

    function getMaxXP(lvl) {
      return Math.floor(BASE_XP * Math.pow(GROWTH_FACTOR, lvl - 1));
    }

    function updateRing() {
      const maxXP = getMaxXP(level);
      const progress = Math.min(currentXP / maxXP, 1);
      
      // Update Circle
      const offset = CIRCUMFERENCE * (1 - progress);
      progressEl.style.strokeDashoffset = offset;
      levelEl.textContent = level;

      // Update Bar
      barFillEl.style.width = `${progress * 100}%`;
      barLevelEl.textContent = level;

      if (isInitialized) {
        ipcRenderer.send('save-data', { level, currentXP, totalCommits });
      }
    }

    function addXP(amount) {
      currentXP += amount;
      let maxXP = getMaxXP(level);
      let levelsGained = 0;

      while (currentXP >= maxXP) {
        currentXP -= maxXP;
        level++;
        levelsGained++;
        maxXP = getMaxXP(level);
      }

      if (levelsGained > 0) {
        triggerLevelUpEffects();
      } else {
        triggerGainXPEffects();
      }

      updateRing();
    }

    function triggerGainXPEffects() {
      document.body.classList.add('is-animating');
      const activeElement = currentShape === 'circular' ? progressEl : barFillEl;
      
      activeElement.classList.remove('xp-gain-anim');
      void activeElement.offsetWidth;
      activeElement.classList.add('xp-gain-anim');
      
      setTimeout(() => document.body.classList.remove('is-animating'), 800);
    }

    function triggerLevelUpEffects() {
      document.body.classList.add('is-animating');
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      const levelBadge = currentShape === 'circular' ? levelEl : barLevelEl;

      container.classList.remove('level-up-anim');
      void container.offsetWidth;
      container.classList.add('level-up-anim');

      levelBadge.classList.remove('badge-pop');
      void levelBadge.offsetWidth;
      levelBadge.classList.add('badge-pop');

      triggerParticles();
      setTimeout(() => document.body.classList.remove('is-animating'), 1500);
    }

    function triggerParticles() {
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      // Center particles in the container
      const rect = container.getBoundingClientRect();
      particlesContainer.style.left = `${rect.left + rect.width / 2}px`;
      particlesContainer.style.top = `${rect.top + rect.height / 2}px`;

      const count = currentShape === 'circular' ? 20 : 30;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const angle = Math.random() * Math.PI * 2;
        const distance = 40 + Math.random() * 60;
        const size = 3 + Math.random() * 5;
        
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
        
        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }

    ipcRenderer.on('git-commit', () => {
      totalCommits++;
      addXP(XP_PER_COMMIT);
    });

    ipcRenderer.on('init-data', (event, data) => {
      level = data.level || 1;
      currentXP = data.currentXP || 0;
      totalCommits = data.totalCommits || 0;
      isInitialized = true;
      updateRing();
    });

    ipcRenderer.on('update-style', (event, { shape, position }) => {
      currentShape = shape;
      document.body.className = `mode-${shape}`;
      // Tell main to refresh context menu checkmarks
      ipcRenderer.send('refresh-menu');
    });

    ipcRenderer.on('hover-state', (event, hovered) => {
      document.body.classList.toggle('is-hovered', hovered);
    });

    updateRing();
  </script>
</body>
</html>
