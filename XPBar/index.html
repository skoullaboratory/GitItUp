<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitItUp — Git Gamification</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
</head>

<body class="mode-circular">
  <div class="app-container">
  <!-- 1. Circular Mode -->
  <div class="xp-circle-wrapper">
    <div class="streak-badge" title="Racha de días seguidos">
      <svg class="flame-icon" viewBox="0 0 24 24">
        <path d="M12,2C12,2 12,7 9,10C7,12 8,15 10,17C12,19 14,19 16,17C18,15 17,11 15,9C14,8 13,8 12,8C12,8 12,2 12,2Z" />
      </svg>
      <span class="streak-count">x1</span>
    </div>
    <svg class="xp-ring-svg" viewBox="0 0 80 80">
      <defs>
        <linearGradient id="xp-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="var(--xp-color-1, #00e5ff)" />
          <stop offset="100%" stop-color="var(--xp-color-2, #76ff03)" />
        </linearGradient>
      </defs>
      <circle class="xp-ring-track" cx="40" cy="40" r="30" />
      <circle id="xp-progress" class="xp-ring-progress" cx="40" cy="40" r="30" />
    </svg>
    <div class="xp-center">
      <div id="xp-level" class="xp-level-badge">1</div>
    </div>
  </div>

  <!-- 2. Horizontal Mode -->
  <div class="xp-horizontal-wrapper">
    <div class="streak-badge" title="Racha de días seguidos">
      <svg class="flame-icon" viewBox="0 0 24 24">
        <path d="M12,2C12,2 12,7 9,10C7,12 8,15 10,17C12,19 14,19 16,17C18,15 17,11 15,9C14,8 13,8 12,8C12,8 12,2 12,2Z" />
      </svg>
      <span class="streak-count">x1</span>
    </div>
    <div class="xp-bar-level" id="xp-bar-level">1</div>
    <div class="xp-bar-track">
      <div class="xp-bar-fill" id="xp-bar-fill"></div>
    </div>
  </div>

  <!-- 3. Theme Selector Overlay -->
  <div class="theme-selector-container" id="theme-selector">
    <div class="settings-header">
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Volver
      </button>
    </div>

    <div class="settings-title">Estilo</div>
    <div class="segment-control" id="shape-selector">
      <button class="segment-btn" data-value="circular">Circular</button>
      <button class="segment-btn" data-value="horizontal">Horizontal</button>
    </div>

    <div class="settings-title">Posición</div>
    <div class="position-grid" id="position-selector">
      <!-- Dynamic Positions -->
    </div>

    <div class="settings-title">Temas</div>
    <div class="theme-list" id="theme-list"></div>
    
    <div class="settings-title">Transparencia</div>
    <div class="transparency-control">
      <input type="range" id="opacity-slider" min="0.05" max="1.0" step="0.01" value="1.0">
    </div>

    <div class="settings-footer">
      <button class="exit-btn" id="exit-app-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
        Salir Aplicación
      </button>
    </div>
  </div>

  <div class="settings-trigger" id="settings-trigger">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
      <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
    </svg>
  </div>
  </div>
  <div id="particles"></div>

  <script>
    const { ipcRenderer } = require('electron');

    // ── Constants ──
    const CIRCUMFERENCE = 2 * Math.PI * 30;
    const BASE_XP = 100;
    const GROWTH_FACTOR = 1.5;

    // ── DOM Elements ──
    const progressEl = document.getElementById('xp-progress');
    const levelEl = document.getElementById('xp-level');
    const barFillEl = document.getElementById('xp-bar-fill');
    const barLevelEl = document.getElementById('xp-bar-level');
    const circleWrapper = document.querySelector('.xp-circle-wrapper');
    const horizontalWrapper = document.querySelector('.xp-horizontal-wrapper');
    const particlesContainer = document.getElementById('particles');
    const themeSelector = document.getElementById('theme-selector');
    const themeList = document.getElementById('theme-list');
    const settingsTrigger = document.getElementById('settings-trigger');
    const opacitySlider = document.getElementById('opacity-slider');
    const shapeSelector = document.getElementById('shape-selector');
    const positionSelector = document.getElementById('position-selector');
    const exitAppBtn = document.getElementById('exit-app-btn');
    const backBtn = document.getElementById('back-btn');
    const streakCountEls = document.querySelectorAll('.streak-count');
    const streakBadges = document.querySelectorAll('.streak-badge');

    // ── State ──
    let level = 1;
    let currentXP = 0;
    let totalCommits = 0;
    let isInitialized = false;
    let currentShape = 'circular';
    let currentTheme = 'cyan-green';
    let currentOpacity = 1.0;
    let currentPosition = 'bottom-right';
    let streak = 0;
    let lastCommitDate = "";

    const THEMES = {
      'cyan-green': ['#00e5ff', '#76ff03'],
      'sunset': ['#ff512f', '#dd2476'],
      'purple-haze': ['#8e2de2', '#4a00e0'],
      'gold': ['#f7971e', '#ffd200'],
      'forest': ['#11998e', '#38ef7d'],
      'ocean': ['#00c6ff', '#0072ff'],
      'cherry': ['#ee9ca7', '#ffdde1'],
      'volcano': ['#ff4b1f', '#ff9068'],
      'cyberpunk': ['#ff00cc', '#3333ff'],
      'silver': ['#bdc3c7', '#2c3e50']
    };

    function getMaxXP(lvl) {
      return Math.floor(BASE_XP * Math.pow(GROWTH_FACTOR, lvl - 1));
    }

    // ── Theme Picker Logic ──
    function initThemes() {
      themeList.innerHTML = '';
      Object.keys(THEMES).forEach(key => {
        const [c1, c2] = THEMES[key];
        const btn = document.createElement('div');
        btn.className = `theme-btn ${key === currentTheme ? 'active' : ''}`;
        btn.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
        btn.title = key.replace('-', ' ');
        btn.onclick = () => {
          ipcRenderer.send('update-theme', key);
          currentTheme = key;
          document.querySelectorAll('.theme-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        };
        themeList.appendChild(btn);
      });
    }

    function initShapeSelector() {
      const btns = shapeSelector.querySelectorAll('.segment-btn');
      btns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.value === currentShape);
        btn.onclick = () => {
          const val = btn.dataset.value;
          currentShape = val;
          ipcRenderer.send('update-shape', val);
          refreshSettingsUI();
        };
      });
    }

    const POSITION_LABELS = {
      'top-left': 'TL', 'top-right': 'TR', 'bottom-left': 'BL', 'bottom-right': 'BR',
      'top': 'Arriba', 'bottom': 'Abajo'
    };

    function initPositionSelector() {
      positionSelector.innerHTML = '';
      const positions = currentShape === 'circular' ? 
        ['top-left', 'top-right', 'bottom-left', 'bottom-right'] : 
        ['top', 'bottom'];
      
      positions.forEach(pos => {
        const btn = document.createElement('button');
        btn.className = `pos-btn ${pos === currentPosition ? 'active' : ''}`;
        btn.textContent = POSITION_LABELS[pos] || pos;
        btn.onclick = () => {
          currentPosition = pos;
          ipcRenderer.send('update-position', pos);
          refreshSettingsUI();
        };
        positionSelector.appendChild(btn);
      });
    }

    function refreshSettingsUI() {
      initShapeSelector();
      initPositionSelector();
      initThemes();
    }

    settingsTrigger.onclick = (e) => {
      e.stopPropagation();
      const showing = document.body.classList.toggle('show-settings');
      if (showing) refreshSettingsUI();
      ipcRenderer.send('expand-window', showing);
    };

    backBtn.onclick = (e) => {
      e.stopPropagation();
      document.body.classList.remove('show-settings');
      ipcRenderer.send('expand-window', false);
    };

    exitAppBtn.onclick = () => {
      ipcRenderer.send('quit-app');
    };

    opacitySlider.oninput = (e) => {
      const val = e.target.value;
      currentOpacity = val;
      document.documentElement.style.setProperty('--xp-idle-opacity', val);
      ipcRenderer.send('update-opacity', val);
    };

    function updateRing(animate = true) {
      const maxXP = getMaxXP(level);
      const progress = Math.min(currentXP / maxXP, 1);
      
      // Update Circle
      if (!animate) progressEl.style.transition = 'none';
      const offset = CIRCUMFERENCE * (1 - progress);
      progressEl.style.strokeDashoffset = offset;
      if (!animate) {
        void progressEl.offsetWidth;
        progressEl.style.transition = 'stroke-dashoffset 0.6s cubic-bezier(0.4, 0, 0.2, 1)';
      }
      
      levelEl.textContent = level;

      // Update Bar
      if (!animate) barFillEl.style.transition = 'none';
      barFillEl.style.width = `${progress * 100}%`;
      if (!animate) {
        void barFillEl.offsetWidth;
        barFillEl.style.transition = 'width 0.4s ease-out';
      }
      
      barLevelEl.textContent = level;

      if (isInitialized) {
        ipcRenderer.send('save-data', { level, currentXP, totalCommits, streak, lastCommitDate });
      }
    }

    function updateStreak() {
      const today = new Date().toISOString().split('T')[0];
      if (lastCommitDate === today) return; // Already updated today

      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split('T')[0];

      if (lastCommitDate === yesterdayStr) {
        streak++;
      } else {
        streak = 1;
      }

      lastCommitDate = today;
      streakCountEls.forEach(el => el.textContent = `x${streak}`);
      
      // Flash the streak badge
      streakBadges.forEach(badge => {
        badge.classList.remove('pulse-anim');
        void badge.offsetWidth;
        badge.classList.add('pulse-anim');
      });
    }

    function addXP(amount) {
      currentXP += amount;
      let maxXP = getMaxXP(level);

      if (currentXP >= maxXP) {
        const overflow = currentXP - maxXP;
        currentXP = maxXP; 
        updateRing(true); // Animate fill to 100%
        
        setTimeout(() => {
          level++;
          currentXP = overflow;
          updateRing(false); // Silently reset bar
          triggerLevelUpEffects();
        }, 600); // Wait for fill animation to complete
      } else {
        updateRing(true);
        triggerGainXPEffects();
        triggerXPOrbs();
      }
    }

    function triggerGainXPEffects() {
      document.body.classList.add('is-animating');
      const activeElement = currentShape === 'circular' ? progressEl : barFillEl;
      
      activeElement.classList.remove('xp-gain-anim');
      void activeElement.offsetWidth;
      activeElement.classList.add('xp-gain-anim');
      
      setTimeout(() => document.body.classList.remove('is-animating'), 800);
    }

    function triggerLevelUpEffects() {
      document.body.classList.add('is-animating');
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      const levelBadge = currentShape === 'circular' ? levelEl : barLevelEl;

      // Shake & Flash
      container.classList.remove('shake-anim');
      document.body.classList.remove('flash-anim');
      void container.offsetWidth;
      container.classList.add('shake-anim');
      document.body.classList.add('flash-anim');

      triggerFloatingText("LEVEL UP!");

      container.classList.remove('level-up-anim');
      void container.offsetWidth;
      container.classList.add('level-up-anim');

      levelBadge.classList.remove('badge-pop');
      void levelBadge.offsetWidth;
      levelBadge.classList.add('badge-pop');

      triggerParticles(true);
      triggerXPOrbs(true); // More orbs on level up
      
      setTimeout(() => {
        document.body.classList.remove('is-animating', 'flash-anim');
        container.classList.remove('shake-anim');
      }, 1500);
    }

    function triggerFloatingText(text) {
      const el = document.createElement('div');
      el.className = 'floating-text';
      el.textContent = text;
      
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      const rect = container.getBoundingClientRect();
      el.style.left = `${rect.left + rect.width / 2}px`;
      el.style.top = `${rect.top}px`;
      
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2000);
    }

    function triggerXPOrbs(isLevelUp = false) {
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      const rect = container.getBoundingClientRect();
      const centerX = rect.left + rect.width / 2;
      const centerY = rect.top + rect.height / 2;
      
      const maxXP = getMaxXP(level);
      const progress = Math.min(currentXP / maxXP, 1);
      
      let targetX, targetY;
      
      if (currentShape === 'circular') {
        const radius = rect.width * 0.375;
        const angle = -Math.PI / 2 + (progress * Math.PI * 2);
        targetX = centerX + Math.cos(angle) * (radius);
        targetY = centerY + Math.sin(angle) * (radius);
      } else {
        const fillRect = barFillEl.getBoundingClientRect();
        targetX = Math.max(rect.left, fillRect.right);
        targetY = centerY;
      }

      const count = isLevelUp ? 20 : 12;
      for (let i = 0; i < count; i++) {
        const orb = document.createElement('div');
        orb.className = 'xp-orb';
        
        const spawnAngle = Math.random() * Math.PI * 2;
        const spawnDistance = (currentShape === 'circular' ? 40 : 60) + Math.random() * 60;
        const startX = targetX + Math.cos(spawnAngle) * spawnDistance;
        const startY = targetY + Math.sin(spawnAngle) * spawnDistance;

        orb.style.left = `${startX}px`;
        orb.style.top = `${startY}px`;
        orb.style.setProperty('--tx', `${targetX - startX}px`);
        orb.style.setProperty('--ty', `${targetY - startY}px`);
        orb.style.animationDelay = `${i * 0.05}s`;

        document.body.appendChild(orb);
        setTimeout(() => orb.remove(), 1200);
      }
    }
    function triggerParticles(enhanced = false) {
      const container = currentShape === 'circular' ? circleWrapper : horizontalWrapper;
      // Center particles in the container
      const rect = container.getBoundingClientRect();
      particlesContainer.style.left = `${rect.left + rect.width / 2}px`;
      particlesContainer.style.top = `${rect.top + rect.height / 2}px`;

      const baseCount = currentShape === 'circular' ? 20 : 30;
      const count = enhanced ? baseCount * 2.5 : baseCount;
      
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        if (enhanced) p.classList.add('enhanced-particle');
        
        const angle = Math.random() * Math.PI * 2;
        const distance = (enhanced ? 60 : 40) + Math.random() * (enhanced ? 100 : 60);
        const size = (enhanced ? 4 : 3) + Math.random() * 5;
        
        p.style.width = `${size}px`;
        p.style.height = `${size}px`;
        p.style.setProperty('--dx', `${Math.cos(angle) * distance}px`);
        p.style.setProperty('--dy', `${Math.sin(angle) * distance}px`);
        
        particlesContainer.appendChild(p);
        setTimeout(() => p.remove(), 1500);
      }
    }

    ipcRenderer.on('git-event', (event, type) => {
      if (type === 'commit') {
        totalCommits++;
        updateStreak();
        addXP(1);
      } else if (type === 'push') {
        addXP(25);
      } else if (type === 'pr') {
        addXP(50);
      }
    });

    ipcRenderer.on('init-data', (event, data) => {
      level = data.level || 1;
      currentXP = data.currentXP || 0;
      totalCommits = data.totalCommits || 0;
      streak = data.streak || 0;
      lastCommitDate = data.lastCommitDate || "";
      currentShape = data.shape || 'circular';
      currentPosition = data.position || 'bottom-right';
      isInitialized = true;
      
      streakCountEls.forEach(el => el.textContent = `x${streak}`);
      
      if (data.theme) {
        currentTheme = data.theme;
        const [c1, c2] = THEMES[currentTheme] || THEMES['cyan-green'];
        document.documentElement.style.setProperty('--xp-color-1', c1);
        document.documentElement.style.setProperty('--xp-color-2', c2);
      }

      if (data.opacity) {
        currentOpacity = data.opacity;
        opacitySlider.value = currentOpacity;
        document.documentElement.style.setProperty('--xp-idle-opacity', currentOpacity);
      }

      updateRing();
      refreshSettingsUI();
    });

    ipcRenderer.on('update-style', (event, { shape, position, theme }) => {
      currentShape = shape;
      currentPosition = position;
      if (theme) {
        currentTheme = theme;
        const [c1, c2] = THEMES[theme] || THEMES['cyan-green'];
        document.documentElement.style.setProperty('--xp-color-1', c1);
        document.documentElement.style.setProperty('--xp-color-2', c2);
        
        // Update active class in picker
        document.querySelectorAll('.theme-btn').forEach(btn => {
          btn.classList.toggle('active', btn.title === theme.replace('-', ' '));
        });
      }
      document.body.className = `mode-${shape}${document.body.classList.contains('is-hovered') ? ' is-hovered' : ''}`;
      refreshSettingsUI();
      // Tell main to refresh context menu checkmarks
      ipcRenderer.send('refresh-menu');
    });

    ipcRenderer.on('hover-state', (event, hovered) => {
      document.body.classList.toggle('is-hovered', hovered);
      if (!hovered) {
        document.body.classList.remove('show-settings');
        ipcRenderer.send('expand-window', false);
      }
    });

    initThemes();
    updateRing();
  </script>
</body>
</html>
